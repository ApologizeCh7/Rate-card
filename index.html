  const loading = document.getElementById('__bundler_loading');

  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;

    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));

    return btoa(bin);

      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);

    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};

      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {

            const ds = new DecompressionStream('gzip');

              const { done, value } = await reader.read();

            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');

            (entry.compressed ? toBase64(finalBytes) : entry.data);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);

    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:15px;font-weight:600;color:#222\">{{ it.name }}<\u002Fdiv>\n                    <div style=\"font-size:12px;color:#9b9b9b;margin-top:2px\">{{ it.priceEach }} · {{ it.unit }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;align-items:center;border:1px solid #F0C9B2;border-radius:10px;background:#fff;overflow:hidden;flex:none\">\n                    <button onclick=\"{{ it.dec }}\" style=\"{{ stepBtnSm }}\">−<\u002Fbutton>\n                    <span style=\"min-width:28px;text-align:center;font-size:14px;font-weight:700;color:#222\">{{ it.qty }}<\u002Fspan>\n                    <button onclick=\"{{ it.inc }}\" style=\"{{ stepBtnSm }}\">+<\u002Fbutton>\n                  <\u002Fdiv>\n                  <div style=\"min-width:86px;text-align:right;font-size:15px;font-weight:700;color:#222;flex:none\">{{ it.lineTotal }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-top:20px;padding-top:18px;border-top:1px dashed #F0C9B2\">\n              <span style=\"font-size:14px;font-weight:600;color:#555\">รวมทั้งหมด<\u002Fspan>\n              <span style=\"font-size:25px;font-weight:700;color:#E2591F\">{{ orderTotal }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noOrder }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"margin-top:13px;font-size:13px;color:#a79a90;background:#FBF6F2;border:1px dashed #E6D8CD;border-radius:14px;padding:18px;text-align:center\">แตะการ์ดแพ็คเกจด้านบนเพื่อเลือก แล้วปรับจำนวนได้<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:38px;text-align:center\">\n        <div style=\"font-size:14px;font-weight:700;color:#222\">ติดต่องาน<\u002Fdiv>\n        <a href=\"mailto:apologizech7@gmail.com\" style=\"display:inline-block;margin-top:12px;font-size:15px;font-weight:700;color:#E2591F;text-decoration:none\">apologizech7@gmail.com<\u002Fa>\n        <div style=\"font-size:13px;color:#9b9b9b;margin-top:6px\">(คุณคิม)<\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n    <div style=\"text-align:center;font-size:12px;color:#c4a896;margin-top:18px;letter-spacing:0.3px\">ApologizeCh · Rate Card 2026<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { tab: 'video', order: {} };\n\n  fmt(n) { return '฿' + n.toLocaleString('en-US'); }\n\n  livePackages() {\n    return [\n      { id: 'live_solo', name: 'Solo Live', amount: 25000, unit: '1.5 ชั่วโมง',\n        desc1: 'ไลฟ์เกมส์แบบ solo สตรีมสไตล์ storytelling', desc2: 'เนื้อหาและการดำเนินเรื่องโดย ApologizeCh',\n        badge: null, tags: [] },\n      { id: 'live_collab', name: 'Live + Toei Collab', amount: 35000, unit: '1.5 ชั่วโมง',\n        desc1: 'ไลฟ์ร่วมกับ Toei เพื่อนช่อง', desc2: 'เข้าถึงฐานผู้ชมสองช่องพร้อมกัน',\n        badge: 'ยอดนิยม', tags: [{ label: 'ft. Toei', kind: 'blue' }] },\n      { id: 'live_gacha', name: 'Live + Toei + เติมกาชา', amount: 45000, unit: '2 ชั่วโมง',\n        desc1: 'ไลฟ์เต็มรูปแบบ รวมเซสชั่นเติมกาชา', desc2: 'โปรดักชั่นสูง · engagement สูงสุด',\n        badge: null, tags: [{ label: 'ft. Toei', kind: 'blue' }, { label: 'Gacha', kind: 'gold' }] },\n    ];\n  }\n\n  videoPackages() {\n    return [\n      { id: 'vid_short', name: 'Short VDO Story', amount: 15000, unit: '1 คลิป',\n        desc1: 'คลิปเล่าเรื่องแบบสั้น · ความยาว 1:30 นาที', desc2: '',\n        badge: null, tags: [] },\n      { id: 'vid_single', name: 'Storytelling คลิปเดียว', amount: 45000, unit: '1 คลิป',\n        desc1: 'คลิปเล่าเรื่องสไตล์ ApologizeCh', desc2: 'ตัดต่อ editorial · เนื้อหา branded',\n        badge: null, tags: [] },\n      { id: 'vid_single_np', name: 'Storytelling คลิปเดียว (ไม่โพสต์)', amount: 40000, unit: '1 คลิป',\n        desc1: 'คลิปเล่าเรื่องสไตล์ ApologizeCh · ส่งไฟล์ให้ลูกค้า', desc2: 'ไม่โพสต์ลงช่อง · ลูกค้านำไปใช้เอง',\n        badge: null, tags: [{ label: 'ไม่โพสต์', kind: 'gold' }] },\n      { id: 'vid_collab', name: 'Storytelling + Toei Collab', amount: 60000, unit: '1 คลิป',\n        desc1: 'คลิปร่วมกับ Toei · ผู้ติดตามสองช่องรวมกัน', desc2: 'reach สูงขึ้น · cross-audience engagement',\n        badge: null, tags: [{ label: 'ft. Toei', kind: 'blue' }] },\n      { id: 'vid_premium', name: 'Premium Story Package', amount: 70000, unit: '1 คลิป',\n        desc1: 'สำหรับแคมเปญที่ต้องการคุณภาพสูงสุด', desc2: 'Storytelling แบบครบกระบวนการ',\n        badge: 'พรีเมียม', tags: [],\n        features: ['วาง Concept', 'Story Development', 'Script Writing', 'Premium Production'] },\n      { id: 'vid_doc', name: 'Story Documentary (3–5 Episodes)', amount: 195000, unit: '1 เรื่อง · 45–60 นาที',\n        desc1: 'เปลี่ยนหลาย Episode ให้กลายเป็นสารคดี 1 เรื่อง', desc2: 'เหมาะสำหรับการแข่งขันหรือแคมเปญที่มีเรื่องราวต่อเนื่อง',\n        badge: '⭐ แนะนำ', tags: [],\n        features: ['นำฟุตเทจจาก Guild War / Tournament / Season Event', 'รวมเหตุการณ์จาก 3–5 Episodes', 'เขียน Story ใหม่ทั้งหมด', 'คัดเฉพาะช่วงสำคัญ', 'เล่าเรื่องตั้งแต่ต้นจนจบ · Documentary Style'] },\n      { id: 'vid_bundle', name: 'Bundle 3 คลิป', amount: 120000, unit: '3 คลิป',\n        desc1: 'ประหยัดสุด · เหมาะสำหรับแคมเปญระยะยาว', desc2: 'ครอบคลุมหลาย content format',\n        badge: null, tags: [] },\n    ];\n  }\n\n  addonPackages() {\n    return [\n      { id: 'addon_yt_pr', name: 'YouTube — PR Post', amount: 4200, unit: 'Asset Provided · 1 ภาพ',\n        desc1: 'โพสต์ PR บน YouTube community', desc2: 'ลูกค้าเตรียมภาพให้',\n        badge: null, tags: [] },\n      { id: 'addon_yt_own', name: 'YouTube — Single Photo', amount: 4200, unit: 'Own Create · 1 ภาพ',\n        desc1: 'โพสต์ภาพเดี่ยวบน YouTube community', desc2: 'ครีเอตภาพเองโดย ApologizeCh',\n        badge: null, tags: [] },\n      { id: 'addon_fb_own', name: 'Facebook — Single Photo', amount: 4200, unit: 'Own Create · 1 ภาพ',\n        desc1: 'โพสต์ภาพเดี่ยวบน Facebook', desc2: 'ครีเอตภาพเองโดย ApologizeCh',\n        badge: null, tags: [] },\n      { id: 'addon_fb_pr', name: 'Facebook — PR Post', amount: 1500, unit: 'Asset Provided · 1 ภาพ',\n        desc1: 'โพสต์ PR บน Facebook', desc2: 'ลูกค้าเตรียมภาพให้',\n        badge: null, tags: [] },\n      { id: 'addon_lic_clip', name: 'License Clip', amount: 15000, unit: 'ลิขสิทธิ์ 1 เดือน',\n        desc1: 'สิทธิ์ใช้คลิปเพื่อการโฆษณา', desc2: 'ระยะเวลา 1 เดือน',\n        badge: null, tags: [] },\n      { id: 'addon_lic_photo', name: 'License Photo', amount: 2000, unit: 'ลิขสิทธิ์ 3 เดือน',\n        desc1: 'สิทธิ์ใช้ภาพ (Single Photo · Own Create)', desc2: 'ระยะเวลา 3 เดือน',\n        badge: null, tags: [] },\n      { id: 'addon_srt_th', name: 'ทำ SRT ซับไทย', amount: 2000, unit: '1 คลิป',\n        desc1: 'ส่งไฟล์ SRT ซับภาษาไทย · ความยาวคลิปไม่เกิน 15 นาที', desc2: '',\n        badge: null, tags: [] },\n      { id: 'addon_srt_en', name: 'ทำ SRT ซับ EN', amount: 4000, unit: '1 คลิป',\n        desc1: 'ส่งไฟล์ SRT ซับภาษาอังกฤษ · ความยาวคลิปไม่เกิน 15 นาที', desc2: '',\n        badge: null, tags: [] },\n    ];\n  }\n\n  setQty(id, delta) {\n    this.setState(st => {\n      const o = Object.assign({}, st.order);\n      const next = (o[id] || 0) + delta;\n      if (next <= 0) { delete o[id]; } else { o[id] = next; }\n      return { order: o };\n    });\n  }\n  toggle(id) {\n    this.setState(st => {\n      const o = Object.assign({}, st.order);\n      if (o[id]) { delete o[id]; } else { o[id] = 1; }\n      return { order: o };\n    });\n  }\n\n  decorate(list, order) {\n    const tagMap = {\n      blue: { background: '#E8EEF8', color: '#5C73A6' },\n      gold: { background: '#F6E8CF', color: '#A9772C' },\n    };\n    const tagBase = { display: 'inline-block', fontSize: '12px', fontWeight: 600, padding: '4px 11px', borderRadius: '999px' };\n    const pillBadge = { display: 'inline-block', background: '#FCE5D6', color: '#E2591F', fontSize: '12px', fontWeight: 600, padding: '3px 10px', borderRadius: '999px' };\n\n    return list.map((p) => {\n      const qty = order[p.id] || 0;\n      const isSelected = qty > 0;\n      const tagsStyled = (p.tags || []).map(t => ({ label: t.label, style: Object.assign({}, tagBase, tagMap[t.kind]) }));\n      const stop = (e) => { if (e && e.stopPropagation) e.stopPropagation(); };\n      return Object.assign({}, p, {\n        price: this.fmt(p.amount),\n        qty,\n        tagsStyled,\n        hasTags: (p.tags || []).length > 0,\n        features: p.features || [],\n        hasFeatures: (p.features || []).length > 0,\n        isSelected,\n        badgeStyle: pillBadge,\n        priceStyle: { fontSize: '22px', fontWeight: 700, color: isSelected ? '#E2591F' : '#222' },\n        onSelect: () => this.toggle(p.id),\n        inc: (e) => { stop(e); this.setQty(p.id, 1); },\n        dec: (e) => { stop(e); this.setQty(p.id, -1); },\n        rowStyle: {\n          cursor: 'pointer',\n          padding: '20px 22px', borderRadius: '16px',\n          transition: 'border-color 0.15s, background 0.15s, box-shadow 0.15s',\n          border: isSelected ? '2px solid #F26B2C' : '1px solid #ECECEC',\n          background: isSelected ? '#FFF3EB' : '#fff',\n          boxShadow: isSelected ? '0 10px 28px rgba(242,107,44,0.18)' : '0 1px 2px rgba(0,0,0,0.03)',\n        },\n      });\n    });\n  }\n\n  seg(active) {\n    const base = { flex: '1', padding: '14px', borderRadius: '10px', border: 'none', cursor: 'pointer', fontSize: '15px', fontWeight: 600, textAlign: 'center', transition: 'background 0.15s' };\n    return active\n      ? Object.assign({}, base, { background: '#F26B2C', color: '#fff' })\n      : Object.assign({}, base, { background: 'transparent', color: '#444' });\n  }\n\n  renderVals() {\n    const tab = this.state.tab;\n    const order = this.state.order;\n    const data = tab === 'live' ? this.livePackages() : (tab === 'addon' ? this.addonPackages() : this.videoPackages());\n    const stepBtn = { width: '36px', height: '34px', border: 'none', background: 'transparent', color: '#E2591F', fontSize: '19px', fontWeight: 700, cursor: 'pointer', lineHeight: '1' };\n    const stepBtnSm = Object.assign({}, stepBtn, { width: '32px', height: '30px', fontSize: '17px' });\n\n    const all = this.livePackages().concat(this.videoPackages(), this.addonPackages());\n    const stop = (e) => { if (e && e.stopPropagation) e.stopPropagation(); };\n    const orderItems = all.filter(p => (order[p.id] || 0) > 0).map(p => {\n      const qty = order[p.id];\n      return {\n        id: p.id, name: p.name, unit: p.unit, qty,\n        priceEach: this.fmt(p.amount),\n        lineTotal: this.fmt(p.amount * qty),\n        inc: (e) => { stop(e); this.setQty(p.id, 1); },\n        dec: (e) => { stop(e); this.setQty(p.id, -1); },\n      };\n    });\n    const total = all.reduce((s, p) => s + p.amount * (order[p.id] || 0), 0);\n\n    return {\n      heading: tab === 'live' ? 'แพ็คเกจไลฟ์สด' : (tab === 'addon' ? 'Add-on เพิ่มเติม' : 'แพ็คเกจคลิปวิดีโอ'),\n      packages: this.decorate(data, order),\n      segLive: this.seg(tab === 'live'),\n      segVideo: this.seg(tab === 'video'),\n      segAddon: this.seg(tab === 'addon'),\n      tLive: () => this.setState({ tab: 'live' }),\n      tVideo: () => this.setState({ tab: 'video' }),\n      tAddon: () => this.setState({ tab: 'addon' }),\n      stepBtn, stepBtnSm,\n      orderItems,\n      orderTotal: this.fmt(total),\n      hasOrder: orderItems.length > 0,\n      noOrder: orderItems.length === 0,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
